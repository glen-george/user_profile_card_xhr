<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <h1 class="text-success text-center py-5">know about the Country!!</h1>


        <div class="row">
            <div class="col-2"></div>
            <div class="col-8">
                <div class="d-flex justify-content-center align-items-center">
                    <input id="country" type="text" class="form-control w-50 rounded-0">
                    <button class="btn btn-success rounded-0 ms-3 " onclick="countrySearch()">Search</button>
                </div>
            </div>
            <div class="col-2"></div>

        </div>

        <div class="row">
            <div class="col-2"></div>
            <div class="col-8">
                <div  id="result"  class="row">
                   

                </div>
            </div>
            <div class="col-2"></div>

        </div>




    </div>
</body>




<script>
const countrySearch = async()=>{
    const CountryName = country.value
    console.log(CountryName);
    


    if(CountryName){
  const response = await  fetch(`https://restcountries.com/v3.1/name/${CountryName}`)


   console.log(response);

    if(response.status == 200){

        

   response.json().then(data=>{
    const CountryDetails = data[0]
    console.log(CountryDetails);


    const currencyObject = Object.values(CountryDetails.currencies)[0]
    console.log(`currencyObject: `, currencyObject);
    
    result.innerHTML = ` <div class="col-6 ">
                        <img class="mt-5" width="300px "
                            src=${CountryDetails.flags.png}
                            alt="">

                        <ul class="mt-4 list-group list-group-flush">
                            <li class="list-group-item">${CountryDetails.name.common}</li>
                            <li class="list-group-item">${CountryDetails.name.official}</li>
                            <li class="list-group-item">${CountryDetails.capital}</li>

                        </ul>
                    </div>
                    <div class="col-6">


                        <ul class="mt-4 list-group list-group-flush">
                            <li class="list-group-item">Population:${CountryDetails.population} </li>
                            <li class="list-group-item">Timezone:${CountryDetails.timezones}</li>
                            <li class="list-group-item">Population:${CountryDetails.population}</li>
                            <li class="list-group-item">Continents:${CountryDetails.name.common} </li>
                            <li class="list-group-item">Currency:${currencyObject.symbol} ${currencyObject.name}</li>
                            <li class="list-group-item">language:${Object.values(CountryDetails.languages)}</li>
                            <li class="list-group-item">Google Map:<a href= ${CountryDetails.maps.googleMaps} target="_blank">${CountryDetails.maps.googleMaps}</a></li>
                            

                        </ul>
                    </div>`
    

   
    
   })
    }else{
        alert(`Something Went wrong`)
    }
   
    }else{
      alert(`Enter a Country Name!!`)
        
    }
 
   
    


}
</script>

</html>
