<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>new-crud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="container mt-4 ">
        <h1 class="text-center">CRUD APP</h1>
        <div class="mt-5">
            <form id="UserForm" class="d-flex justify-content-between  gap-2 ">
                <input id="editIndex"  type="hidden" >  
                <input id="name" class="form-control" type="text" placeholder="enter ur name">
                <input id="email" class="form-control" type="text" placeholder="enter ur e-mail">
                <button type="submit" class="btn btn-lg btn-primary" onclick="displayUser()">Create</button>
            </form>

            <table id="TableBody" class="table mt-4">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>E-mail</th>
                </tr>


                <tbody id="tableBody">
                   
                    </tr>

                </tbody>
            </table>

        </div>
    </div>

</body>


<script>
    // form

    let users = []
    let editIndex = ""

    const form = document.getElementById("UserForm")
    // tablebody
    const table = document.getElementById("TableBody")

    const editIndexInput = document.getElementById("editIndex")



    if(sessionStorage.getItem("users")){
      users = JSON.parse( sessionStorage.getItem("users"))
      console.log(users);
      displayUser()
      
    }

    // add
    form.addEventListener("submit", (e) => {
        e.preventDefault()

        // add name & email to user
        const name = document.getElementById("name").value
        const email = document.getElementById("email").value


        if (editIndexInput.value == "") {
            users.push({ name, email })
        } else {
            users[editIndexInput.value] = { name, email }
            editIndexInput.value = ""
        }

        sessionStorage.setItem("users",JSON.stringify(users))


        console.log(users);
        displayUser()
        form.reset()


    })

    // get

    function displayUser () {
        tableBody.innerHTML = ""
        users.forEach((user, index) => {
            tableBody.innerHTML += ` <tr>
                        <td>${index + 1}</td>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td class="d-flex gap-3">
                            <button  class="btn btn-warning" onClick="editUser(${index})" >Edit</button>
                            <button class="btn btn-danger" onClick="userDelete(${index})" >Delete</button>
                        </td>
                    </tr>`


        })

    }


    // update
    const editUser = (index) => {
        document.getElementById("name").value = users[index].name
        document.getElementById("email").value = users[index].email
        editIndexInput.value = index

    }




    // delete


    const userDelete= (index)=>{
        if(confirm (`Do you want to delete this user!!`)){
            users.splice(index,1)
             sessionStorage.setItem("users",JSON.stringify(users))
            displayUser()
        }


    }
</script>

</html>
