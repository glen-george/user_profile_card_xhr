<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-lg-3"></div>
            <div class="col-lg-6">
                <div class="d-flex gap-1">
                    <input id="userInput" type="text" placeholder="Enter your age" class="form-control">
                    <button class="btn btn-outline-success" onclick="checkEligibility()">Check</button>
                </div>

                <div class="mt-3" id="result">

                </div>
            </div>
            <div class="col-lg-3"></div>
        </div>
    </div>


    <script>
        

        const checkEligibility = ()=>{
            const userInput = document.getElementById("userInput")
             const result = document.getElementById("result")
            var age = userInput.value
            if(age>=18){
result.innerHTML = `<h3 style="color: green;">Eligible to vote</h3>`

            }else{
         result.innerHTML = `<h3 style="color: red;">Not Eligible to vote</h3>`       
            }
               
            
        }
    </script>
    
</body>
</html>
