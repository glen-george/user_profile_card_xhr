<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

        crossorigin="anonymous"></script>
</head>
<body>
    <div style="height: 80vh;" class="container   my-5 d-flex  justify-content-center  align-items-center flex-column">
        <h1>Lottery Prediction</h1>
        <div class="my-5  p-5  border  rounded bg-warning">

            <h1 id="result" class="text-center text-white">Lottery Status</h1>
        </div>
    </div>
</body>
<script>
    let  promise = new Promise((resolve,reject)=>{
        let mylotteryTicket = 2;
        let winLotteryTicket = Math.floor(Math.random()*5)+1
        console.log(winLotteryTicket);
        if(mylotteryTicket == winLotteryTicket){
            resolve(`Congragulation you have WON!!`)
        }else{
            reject(`Better luck next time`)
        }
        
    })
    promise.then((value)=>result.innerHTML = value).catch((reason)=>result.innerHTML = reason)
</script>
</html>
