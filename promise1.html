<html lang="en">

<head>
    <meta charset="UTF-8">

<body>
    <div class="container    d-flex justify-content-center align-items-center flex-column my-4" style="height: 80vh ; ">
        <h1>Lottery Prediction</h1>
        <div class="p-5  my-5 border rounded bg-warning ">
            <h1 id="result" class="text-white text-center">Lottery Status</h1>
        </div>

    </div>
</body>
<script>
    let promise = new Promise((resolve, reject) => {
        let myTicketNo = 2;
        let winnerLotteryTicket = Math.floor(Math.random() * 5) + 1
        // console.log(winnerLotteryTicket);
        if (myTicketNo == winnerLotteryTicket) {
            resolve(`Congrats YOU have Won the Ticket`)

        } else {
            reject(`Better luck Next Time!!`);

        }


    })

  promise.then((value)=>result.innerHTML= value).catch((reason)=>result.innerHTML = reason)
</script>
